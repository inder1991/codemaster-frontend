apiVersion: apps/v1
kind: Deployment
metadata:
  name: codemaster-frontend
  namespace: codemaster-cutover
  labels:
    app.kubernetes.io/name: codemaster-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: codemaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: codemaster-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codemaster-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: codemaster
    spec:
      containers:
        - name: frontend
          image: codemaster-frontend:api-proxy
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: BACKEND_API_BASE_URL
              value: http://codemaster-backend.codemaster-cutover.svc:80
          readinessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: codemaster-frontend
  namespace: codemaster-cutover
  labels:
    app.kubernetes.io/name: codemaster-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: codemaster
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: codemaster-frontend
