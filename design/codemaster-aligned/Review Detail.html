<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Review · codemaster admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="globals.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="c-bg-surface">
  <div id="root" data-screen-label="01 Review detail"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="sidebar-shell.jsx"></script>
  <script type="text/babel" src="review-detail.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "review_state": "complete"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        document.documentElement.classList.toggle("dark", tweaks.theme === "dark");
      }, [tweaks.theme]);

      return (
        <>
          <window.SidebarShell
            user={{ id: "i.singh@acme.io", name: "Inder Singh", email: "i.singh@acme.io", role: "platform_owner" }}
            orgName="acme"
            currentHref="/your-reviews"
          >
            <window.ReviewDetailPage tweaks={tweaks} />
          </window.SidebarShell>
          <window.TweaksPanel title="Tweaks">
            <window.TweakSection label="Theme">
              <window.TweakRadio
                label="Mode"
                value={tweaks.theme}
                options={[
                  { value: "light", label: "Light" },
                  { value: "dark",  label: "Dark"  }
                ]}
                onChange={(v) => setTweak("theme", v)}
              />
            </window.TweakSection>
            <window.TweakSection label="Review state">
              <window.TweakSelect
                label="state"
                value={tweaks.review_state}
                options={[
                  { value: "queued",       label: "Queued" },
                  { value: "in_progress",  label: "In progress" },
                  { value: "complete",     label: "Complete" },
                  { value: "failed",       label: "Failed" }
                ]}
                onChange={(v) => setTweak("review_state", v)}
              />
            </window.TweakSection>
          </window.TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
