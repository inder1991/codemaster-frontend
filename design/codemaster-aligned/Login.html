<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · codemaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="globals.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    .dot-grid-light {
      background-image: radial-gradient(oklch(80% 0.018 80 / 0.55) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .dark .dot-grid-light {
      background-image: radial-gradient(oklch(35% 0.012 270 / 0.7) 1px, transparent 1px);
    }
    .ambient-glow {
      background:
        radial-gradient(ellipse 75% 60% at 50% 50%,
          oklch(72% 0.16 65 / 0.16) 0%,
          oklch(72% 0.16 65 / 0.05) 35%,
          oklch(72% 0.16 65 / 0) 65%);
    }
    .dark .ambient-glow {
      background:
        radial-gradient(ellipse 65% 50% at 50% 50%,
          oklch(72% 0.16 65 / 0.22) 0%,
          oklch(72% 0.16 65 / 0.08) 30%,
          oklch(72% 0.16 65 / 0) 60%);
    }
    /* drift = subtle ambient float for background activity tiles */
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0   oklch(72% 0.13 165 / 0.55); }
      70%      { box-shadow: 0 0 0 6px oklch(72% 0.13 165 / 0); }
    }
    .pulse-dot { animation: pulse-dot 2s cubic-bezier(0.4,0,0.6,1) infinite; }

    .field {
      background-color: oklch(99% 0.008 80);
      color: oklch(15% 0.015 80);
      border: 1px solid oklch(86% 0.022 80);
      box-shadow: inset 0 1px 0 oklch(0% 0 0 / 0.02);
    }
    .dark .field {
      background-color: oklch(20% 0.012 270);
      color: oklch(95% 0.005 80);
      border-color: oklch(32% 0.012 270);
      box-shadow: inset 0 1px 0 oklch(0% 0 0 / 0.20);
    }
    .field::placeholder { color: oklch(58% 0.01 80); }
    .dark .field::placeholder { color: oklch(50% 0.008 270); }
    .field:focus {
      outline: none;
      border-color: oklch(72% 0.16 65);
      box-shadow: inset 0 1px 0 oklch(0% 0 0 / 0.02), 0 0 0 4px oklch(72% 0.16 65 / 0.18);
    }
    .dark .field:focus {
      box-shadow: inset 0 1px 0 oklch(0% 0 0 / 0.20), 0 0 0 4px oklch(72% 0.16 65 / 0.30);
    }
    .caps-pill { background-color: oklch(94% 0.06 80); color: oklch(50% 0.14 80); }
    .dark .caps-pill { background-color: oklch(26% 0.10 80); color: oklch(82% 0.16 80); }

    .sso-btn {
      background-color: oklch(99% 0.008 80);
      color: oklch(15% 0.015 80);
      border: 1px solid oklch(86% 0.022 80);
      box-shadow: 0 1px 0 oklch(0% 0 0 / 0.02);
    }
    .dark .sso-btn {
      background-color: oklch(22% 0.012 270);
      color: oklch(95% 0.005 80);
      border-color: oklch(34% 0.012 270);
      box-shadow: 0 1px 0 oklch(0% 0 0 / 0.20);
    }
    .sso-btn:hover { border-color: oklch(72% 0.16 65 / 0.6); }

    .or-divider { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
    .or-divider::before, .or-divider::after { content: ""; height: 1px; background-color: oklch(86% 0.022 80); }
    .dark .or-divider::before, .dark .or-divider::after { background-color: oklch(32% 0.012 270); }

    /* GitHub PR preview tokens */
    :root {
      --gh-canvas: oklch(98% 0.005 250);
      --gh-card: oklch(100% 0 0);
      --gh-border: oklch(89% 0.008 250);
      --gh-text: oklch(20% 0.015 250);
      --gh-muted: oklch(48% 0.012 250);
      --gh-faint: oklch(60% 0.012 250);
      --gh-link: oklch(48% 0.18 255);
      --gh-add-bg: oklch(95% 0.07 145);
      --gh-add-num: oklch(90% 0.09 145);
      --gh-del-bg: oklch(95% 0.07 25);
      --gh-del-num: oklch(90% 0.09 25);
      --gh-ctx-bg: oklch(98% 0.005 250);
      --gh-ctx-num: oklch(96% 0.005 250);
      --gh-bot-bg: oklch(96% 0.02 280);
      --gh-bot-fg: oklch(40% 0.16 280);
      --gh-suggest-bg: oklch(96% 0.02 280);
      --gh-suggest-bd: oklch(85% 0.05 280);
    }
    .dark {
      --gh-canvas: oklch(16% 0.012 250);
      --gh-card: oklch(19% 0.014 250);
      --gh-border: oklch(28% 0.014 250);
      --gh-text: oklch(94% 0.008 250);
      --gh-muted: oklch(70% 0.012 250);
      --gh-faint: oklch(56% 0.012 250);
      --gh-link: oklch(72% 0.15 255);
      --gh-add-bg: oklch(28% 0.06 145 / 0.45);
      --gh-add-num: oklch(34% 0.07 145 / 0.55);
      --gh-del-bg: oklch(30% 0.07 25 / 0.45);
      --gh-del-num: oklch(36% 0.08 25 / 0.55);
      --gh-ctx-bg: oklch(19% 0.014 250);
      --gh-ctx-num: oklch(22% 0.014 250);
      --gh-bot-bg: oklch(28% 0.06 280 / 0.5);
      --gh-bot-fg: oklch(82% 0.10 280);
      --gh-suggest-bg: oklch(24% 0.04 280 / 0.4);
      --gh-suggest-bd: oklch(36% 0.08 280);
    }
    .gh-canvas { background-color: var(--gh-canvas); color: var(--gh-text); }
    .gh-card { background-color: var(--gh-card); border: 1px solid var(--gh-border); border-radius: 8px; }
    .gh-text { color: var(--gh-text); }
    .gh-muted { color: var(--gh-muted); }
    .gh-faint { color: var(--gh-faint); }
    .gh-link { color: var(--gh-link); }
    .gh-bot { background-color: var(--gh-bot-bg); color: var(--gh-bot-fg); }
    .gh-suggest { background-color: var(--gh-suggest-bg); border: 1px solid var(--gh-suggest-bd); border-radius: 6px; }

    .gh-diff { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; line-height: 20px; }
    .gh-diff .row { display: grid; grid-template-columns: 36px 1fr; }
    .gh-diff .num { color: var(--gh-faint); text-align: right; padding: 0 6px; user-select: none; font-size: 11px; }
    .gh-diff .add { background-color: var(--gh-add-bg); }
    .gh-diff .add .num { background-color: var(--gh-add-num); }
    .gh-diff .del { background-color: var(--gh-del-bg); }
    .gh-diff .del .num { background-color: var(--gh-del-num); }
    .gh-diff .ctx { background-color: var(--gh-ctx-bg); }
    .gh-diff .ctx .num { background-color: var(--gh-ctx-num); }
    .gh-diff .gut { padding: 0 4px; color: var(--gh-faint); user-select: none; }
    .gh-diff .src { padding: 0 8px; white-space: pre; overflow-x: auto; }

    .gh-sev-blocker { color: oklch(58% 0.20 25); background-color: oklch(95% 0.07 25); }
    .gh-sev-issue { color: oklch(50% 0.16 65); background-color: oklch(95% 0.08 80); }
    .dark .gh-sev-blocker { color: oklch(78% 0.16 25); background-color: oklch(30% 0.10 25 / 0.5); }
    .dark .gh-sev-issue { color: oklch(82% 0.14 65); background-color: oklch(28% 0.10 65 / 0.5); }
  </style>
</head>
<body class="c-bg-surface">
  <div id="root" data-screen-label="01 Login"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "scenario": "default"
    }/*EDITMODE-END*/;

    const ERROR_COPY = {
      bad_credentials: "Invalid credentials.",
      locked: "Account locked. Try again later.",
      no_role: "Authentication succeeded, but this account has no codemaster role assigned.",
      ldap_unreachable: "Auth service temporarily unavailable. Please try again in a few minutes.",
      sso_failed: "SSO sign-in failed. Please try again or use your directory credentials below."
    };

    /* L-09 — banners that call out a recovery path link to the
       configured platform-owner contact (mocked here as mailto). */
    const ERROR_HAS_OWNER_LINK = { no_role: true, locked: true, ldap_unreachable: true };

    function Banner({ tone, children, ownerLink }) {
      const palette = tone === "info" ? "c-statusbg-info c-status-info" : "c-statusbg-down c-status-down";
      return (
        <div role={tone === "danger" ? "alert" : "status"}
             className={`mb-5 px-3 py-2.5 rounded-md t-body ${palette} flex items-start gap-x-2`}>
          <span aria-hidden="true" className="mt-1.5 size-1.5 rounded-full shrink-0"
                style={{ background: "currentColor", opacity: 0.7 }} />
          <span>
            {children}
            {ownerLink ? (
              <>
                {" "}
                <a href="mailto:platform-owners@acme.io"
                   className="underline underline-offset-2" style={{ color: "currentColor", fontWeight: 600 }}>
                  Contact your platform owner →
                </a>
              </>
            ) : null}
          </span>
        </div>
      );
    }

    function Field({ id, name, label, type = "text", required, autoComplete, placeholder, defaultValue, trailing, onKeyUp, trailingPad = 36 }) {
      return (
        <div>
          <label htmlFor={id} className="block t-meta c-text-primary mb-1.5">{label}</label>
          <div className="relative">
            <input id={id} name={name} type={type} required={required}
                   autoComplete={autoComplete} placeholder={placeholder} defaultValue={defaultValue}
                   onKeyUp={onKeyUp}
                   style={trailing ? { paddingRight: trailingPad } : undefined}
                   className="field block w-full rounded-md px-3.5 py-2.5 t-body dur-fast" />
            {trailing ? <div className="absolute inset-y-0 right-2.5 flex items-center gap-x-1.5">{trailing}</div> : null}
          </div>
        </div>
      );
    }

    /* L-04 — show/hide password eye toggle */
    function PasswordToggle({ shown, onToggle }) {
      return (
        <button type="button" onClick={onToggle}
                aria-label={shown ? "Hide password" : "Show password"}
                className="inline-flex items-center justify-center rounded p-1 c-text-faint c-hover-text-primary dur-fast">
          {shown ? (
            <svg viewBox="0 0 20 20" className="size-4" fill="currentColor" aria-hidden="true">
              <path fillRule="evenodd" d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l2.16 2.16C2.94 6.7 1.74 8.27 1.18 9.5a.75.75 0 0 0 0 .65c1.5 3.27 4.5 5.6 8.32 5.6 1.5 0 2.86-.36 4.04-.97l2.18 2.18a.75.75 0 1 0 1.06-1.06L3.28 2.22Zm5.5 7.62 2.4 2.4a2 2 0 0 1-2.4-2.4Zm-1.78-.66 4.84 4.84a3.5 3.5 0 0 1-4.84-4.84Z" clipRule="evenodd"/>
              <path d="M9.5 5.25c-.46 0-.9.04-1.32.12L9.4 6.6a3.5 3.5 0 0 1 4 4l1.97 1.97c.95-.84 1.68-1.86 2.16-2.92a.75.75 0 0 0 0-.65c-1.5-3.27-4.5-5.6-8.03-5.75Z" />
            </svg>
          ) : (
            <svg viewBox="0 0 20 20" className="size-4" fill="currentColor" aria-hidden="true">
              <path d="M10 4.5C5.5 4.5 2 8 1 10c1 2 4.5 5.5 9 5.5s8-3.5 9-5.5c-1-2-4.5-5.5-9-5.5Zm0 8.5a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z"/>
            </svg>
          )}
        </button>
      );
    }

    function BrandMark({ size = 44 }) {
      return (
        <span aria-hidden="true"
              className="inline-flex items-center justify-center rounded-lg c-bg-accent-solid c-text-on-solid"
              style={{ width: size, height: size, fontSize: size * 0.5, fontWeight: 600,
                       boxShadow: "0 6px 18px oklch(72% 0.16 65 / 0.30), inset 0 1px 0 oklch(100% 0 0 / 0.20)" }}>c</span>
      );
    }

    function ConnectedChip() {
      return (
        <div className="inline-flex items-center gap-x-2 px-2.5 py-1 rounded-full c-bg-muted t-caption c-text-muted"
             style={{ letterSpacing: "0.02em" }}>
          <span className="relative inline-flex">
            <span className="size-1.5 rounded-full c-statusdot-healthy pulse-dot" />
          </span>
          <span>Connected · <span className="font-mono">acme.io</span></span>
        </div>
      );
    }

    function CapsHint({ visible }) {
      if (!visible) return null;
      return (
        <span className="caps-pill inline-flex items-center gap-x-1 rounded px-1.5 py-0.5"
              style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.04em" }}>
          <svg viewBox="0 0 16 16" className="size-3" fill="currentColor" aria-hidden="true">
            <path d="M8 1.5 13.5 7H11v3.5H5V7H2.5L8 1.5Zm-3 11h6V14H5v-1.5Z" />
          </svg>
          CAPS
        </span>
      );
    }

    /* L-06 — generic IdP glyph (a stylized circular wordmark stand-in;
       not the Okta logotype). The button label names the IdP in text. */
    function OktaMark() {
      return (
        <svg viewBox="0 0 20 20" className="size-5" aria-hidden="true">
          <circle cx="10" cy="10" r="7.25" fill="none" stroke="oklch(72% 0.16 65)" strokeWidth="2.4" />
          <circle cx="10" cy="10" r="2.4" fill="oklch(72% 0.16 65)" />
        </svg>
      );
    }

    /* Inline spinner for L-10 loading states. */
    function Spinner({ tone = "on-solid" }) {
      const c = tone === "on-solid" ? "currentColor" : "currentColor";
      return (
        <svg viewBox="0 0 20 20" className="size-4 animate-spin" aria-hidden="true">
          <circle cx="10" cy="10" r="7.5" fill="none" stroke={c} strokeWidth="2" opacity="0.25" />
          <path d="M17.5 10a7.5 7.5 0 0 0-7.5-7.5" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" />
        </svg>
      );
    }

    /* ─────── GitHub PR review preview ─────── */

    function GhAvatar({ size = 24 }) {
      return (
        <span aria-hidden="true"
              className="inline-flex items-center justify-center rounded-full c-bg-accent-solid c-text-on-solid shrink-0"
              style={{ width: size, height: size, fontSize: size * 0.45, fontWeight: 700,
                       boxShadow: "inset 0 0 0 1px oklch(0% 0 0 / 0.06)" }}>c</span>
      );
    }
    function GhUserAvatar({ size = 24, ch = "I", hue = 210 }) {
      return (
        <span aria-hidden="true"
              className="inline-flex items-center justify-center rounded-full shrink-0"
              style={{ width: size, height: size, fontSize: size * 0.45, fontWeight: 600,
                       color: "oklch(98% 0.01 80)",
                       background: `linear-gradient(135deg, oklch(58% 0.14 ${hue}), oklch(40% 0.16 ${hue + 30}))`,
                       boxShadow: "inset 0 0 0 1px oklch(0% 0 0 / 0.06)" }}>{ch}</span>
      );
    }

    function GhSeverity({ kind }) {
      const map = { blocker: { label: "blocker", cls: "gh-sev-blocker" }, issue: { label: "issue", cls: "gh-sev-issue" } }[kind];
      return (
        <span className={`inline-flex items-center gap-x-1 rounded-full px-2 py-0.5 ${map.cls}`}
              style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.02em" }}>
          <span aria-hidden="true" className="size-1.5 rounded-full" style={{ background: "currentColor" }} />
          {map.label}
        </span>
      );
    }

    function GhDiffRow({ kind, num, gut, src }) {
      return (
        <div className={`row ${kind}`}>
          <span className="num">{num ?? ""}</span>
          <span className="src"><span className="gut">{gut}</span>{src}</span>
        </div>
      );
    }

    function PrReviewPreview() {
      return (
        <div className="w-full max-w-[420px]">
          {/* Caption above the card */}
          <div className="mb-3 flex items-center gap-x-2">
            <span aria-hidden="true" className="size-1.5 rounded-full c-statusdot-healthy pulse-dot" />
            <span className="t-caption c-text-muted" style={{ letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 600 }}>
              How codemaster reviews
            </span>
          </div>

          {/* PR context strip */}
          <div className="flex items-center gap-x-2 mb-3 t-caption gh-faint">
            <svg viewBox="0 0 16 16" className="size-3.5 gh-muted" fill="currentColor" aria-hidden="true">
              <path d="M8 0a8 8 0 0 0-2.53 15.59c.4.07.55-.17.55-.38v-1.34c-2.22.48-2.69-1.07-2.69-1.07-.36-.92-.89-1.17-.89-1.17-.73-.5.06-.49.06-.49.8.06 1.23.83 1.23.83.72 1.23 1.88.88 2.34.67.07-.52.28-.88.51-1.08-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.83-2.15-.08-.2-.36-1.02.08-2.13 0 0 .67-.21 2.2.82A7.6 7.6 0 0 1 8 3.93c.68 0 1.36.09 2 .27 1.52-1.03 2.19-.82 2.19-.82.44 1.11.16 1.93.08 2.13.51.56.83 1.28.83 2.15 0 3.07-1.87 3.74-3.65 3.94.29.25.54.73.54 1.48v2.19c0 .21.15.46.55.38A8 8 0 0 0 8 0Z" />
            </svg>
            <span className="font-mono gh-text">platform/auth-service</span>
            <span>·</span>
            <span className="font-mono">#2814</span>
            <span className="ml-auto inline-flex items-center gap-x-1.5 rounded-full px-2 py-0.5"
                  style={{ background: "oklch(50% 0.20 145)", color: "white", fontSize: 10, fontWeight: 600 }}>
              <span aria-hidden="true" className="size-1 rounded-full bg-white" />
              Open
            </span>
          </div>

          {/* The single, polished comment */}
          <article className="gh-card overflow-hidden"
                   style={{ boxShadow: "0 20px 50px -20px oklch(0% 0 0 / 0.35), 0 8px 16px -8px oklch(0% 0 0 / 0.15)" }}>
            <header className="flex items-center gap-x-2 px-3.5 py-2 border-b"
                    style={{ borderColor: "var(--gh-border)", background: "var(--gh-canvas)" }}>
              <GhAvatar size={20} />
              <span className="t-body-strong gh-text" style={{ fontSize: 12 }}>codemaster</span>
              <span className="gh-bot rounded px-1.5 py-px" style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.04em" }}>BOT</span>
              <span className="t-caption gh-muted truncate" style={{ fontSize: 11 }}>on <span className="font-mono">auth/totp.py</span> · 2m</span>
              <span className="ml-auto"><GhSeverity kind="blocker" /></span>
            </header>

            <div className="gh-diff border-b" style={{ borderColor: "var(--gh-border)" }}>
              <div className="px-3 py-1 t-caption gh-muted font-mono"
                   style={{ background: "var(--gh-canvas)", borderBottom: "1px solid var(--gh-border)", fontSize: 11 }}>
                @@ -41,7 +41,9 @@ enroll_totp
              </div>
              <GhDiffRow kind="ctx" num="42" gut=" " src="    store = LocalSecretStore()" />
              <GhDiffRow kind="add" num="43" gut="+" src="    store.put(user.id, secret)" />
              <GhDiffRow kind="add" num="44" gut="+" src="    audit.log('totp_enrolled', user.id)" />
              <GhDiffRow kind="ctx" num="45" gut=" " src="    return Ok()" />
            </div>

            <div className="px-3.5 py-3">
              <p className="t-body gh-text" style={{ fontSize: 13, lineHeight: 1.5 }}>
                Race condition — secret is written before the audit log, so a crash between L43–L44 leaves a usable enrolment with no audit trail. Wrap both writes in one transaction.
              </p>

              <div className="mt-2.5 gh-suggest overflow-hidden">
                <div className="px-2.5 py-1 border-b flex items-center gap-x-1.5"
                     style={{ borderColor: "var(--gh-suggest-bd)", background: "oklch(0% 0 0 / 0.03)" }}>
                  <svg viewBox="0 0 16 16" className="size-3 gh-muted" fill="currentColor" aria-hidden="true">
                    <path d="M11.13 1.85a1.5 1.5 0 0 1 2.12 0l.9.9a1.5 1.5 0 0 1 0 2.12L5.65 13.37l-3.93.79.79-3.93 8.62-8.38Z" />
                  </svg>
                  <span className="t-caption gh-muted font-mono" style={{ fontSize: 10 }}>Suggested change</span>
                </div>
                <div className="gh-diff">
                  <GhDiffRow kind="add" num="43" gut="+" src="    with txn():" />
                  <GhDiffRow kind="add" num="44" gut="+" src="        store.put(user.id, secret)" />
                  <GhDiffRow kind="add" num="45" gut="+" src="        audit.log(...)" />
                </div>
              </div>

              <div className="mt-2.5 flex items-start gap-x-1.5 t-caption gh-muted" style={{ fontSize: 11 }}>
                <svg viewBox="0 0 16 16" className="size-3 mt-0.5 shrink-0" fill="currentColor" aria-hidden="true">
                  <path d="M2 2h7l5 5v7a2 2 0 0 1-2 2H2V2Zm7 0v5h5L9 2Z" opacity="0.55" />
                </svg>
                <span>
                  <a href="#" onClick={(e) => e.preventDefault()} className="gh-link underline underline-offset-2">spec/auth.md §4.2</a>
                  <span className="gh-faint"> · enrolment must be atomic with audit</span>
                </span>
              </div>
            </div>
          </article>

          <p className="mt-4 t-caption c-text-faint text-center">
            Every finding cites a verifiable source.
          </p>
        </div>
      );
    }

    /* ─────── Page ─────── */

    function LoginPage({ tweaks }) {
      const showSessionEnded = tweaks.scenario === "session-ended";
      const errorKey = ["bad_credentials","locked","no_role","ldap_unreachable","sso_failed"].includes(tweaks.scenario) ? tweaks.scenario : null;

      /* L-02 — a returning user shows “Welcome back”, a first-timer
         gets product context. The session-ended banner implies prior
         session, so it counts as returning too. */
      const isReturning = showSessionEnded || tweaks.scenario === "session-ended";

      const [caps, setCaps] = useState(false);
      const [showPwd, setShowPwd] = useState(false);          // L-04
      const [submitting, setSubmitting] = useState(null);      // L-10  null | "sso" | "directory"
      const onKeyUp = (e) => setCaps(e.getModifierState && e.getModifierState("CapsLock"));
      const onSso = (e) => { e.preventDefault(); setSubmitting("sso"); setTimeout(() => setSubmitting(null), 1800); };
      const onSubmit = (e) => { e.preventDefault(); setSubmitting("directory"); setTimeout(() => setSubmitting(null), 1800); };

      return (
        <main id="main-content" className="min-h-screen w-full c-bg-surface relative overflow-hidden">
          <div aria-hidden="true" className="absolute inset-0 ambient-glow pointer-events-none" />
          <div aria-hidden="true" className="absolute inset-0 dot-grid-light pointer-events-none" />

          <div className="relative flex flex-col min-h-screen">

            {/* Page-level header — spans full viewport so brand sits at far left, status at far right */}
            <header className="flex items-center justify-between" style={{ paddingLeft: 48, paddingRight: 48, paddingTop: 24, paddingBottom: 24 }}>
              <div className="flex items-center gap-x-2.5">
                <BrandMark size={28} />
                <span className="t-body-strong c-text-primary" style={{ fontSize: 15 }}>codemaster</span>
              </div>
              <a href="#" onClick={(e) => e.preventDefault()}
                 className="inline-flex items-center gap-x-1.5 t-caption c-text-muted c-hover-text-primary dur-fast">
                <span aria-hidden="true" className="size-1.5 rounded-full c-statusdot-healthy pulse-dot" />
                <span>All systems operational</span>
              </a>
            </header>

            {/* Body — single centered form, no right column */}
            <div className="flex-1 flex items-center justify-center" style={{ paddingLeft: 48, paddingRight: 48, paddingTop: 32, paddingBottom: 32 }}>
              <div className="w-full" style={{ maxWidth: 400 }}>

                  <div>
                    <h1 className="t-display c-text-primary text-pretty" style={{ fontSize: 56, lineHeight: 1.05, letterSpacing: "-0.02em", fontWeight: 600 }}>
                      {isReturning ? "Welcome back." : "Sign in."}
                    </h1>
                    <p className="mt-3 t-body c-text-muted" style={{ fontSize: 15 }}>
                      {isReturning
                        ? "Pick up where you left off."
                        : <>Code review at scale — <span className="font-mono c-text-primary">3,074</span> repos, every finding cites a source.</>}
                    </p>
                  </div>

                  <div className="mt-7">
                    {showSessionEnded ? <Banner tone="info">You&apos;ve been signed out.</Banner> : null}
                    {errorKey ? (
                      <Banner tone="danger" ownerLink={ERROR_HAS_OWNER_LINK[errorKey]}>
                        {ERROR_COPY[errorKey]}
                      </Banner>
                    ) : null}

                    {/* L-06 + L-11 — IdP named in label; chevron lives on the redirecting button */}
                    <button type="button" onClick={onSso} disabled={submitting !== null}
                            className="sso-btn w-full inline-flex items-center justify-center gap-x-2.5 rounded-md px-3.5 py-2.5 t-body-strong c-accent-ring dur-fast disabled:opacity-70 disabled:cursor-not-allowed">
                      {submitting === "sso" ? <Spinner /> : <OktaMark />}
                      <span>{submitting === "sso" ? "Redirecting…" : "Continue with SSO"}</span>
                      {submitting !== "sso" ? (
                        <svg viewBox="0 0 20 20" fill="currentColor" className="size-4 -mr-0.5" aria-hidden="true">
                          <path fillRule="evenodd" d="M3 10a.75.75 0 0 1 .75-.75h10.638L10.23 5.29a.75.75 0 1 1 1.04-1.08l5.5 5.25a.75.75 0 0 1 0 1.08l-5.5 5.25a.75.75 0 1 1-1.04-1.08l4.158-3.96H3.75A.75.75 0 0 1 3 10Z" clipRule="evenodd" />
                        </svg>
                      ) : null}
                    </button>

                    {/* L-07 — directory is a peer, not a fallback */}
                    <div className="or-divider my-5">
                      <span aria-hidden="true" />
                      <span className="t-caption c-text-faint" style={{ letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 600 }}>Or with directory</span>
                      <span aria-hidden="true" />
                    </div>

                    <form method="post" action="#" onSubmit={onSubmit} className="space-y-4">
                      <Field id="username" name="username" label="Username" type="text"
                             autoComplete="username" required placeholder="i.singh"
                             defaultValue={errorKey && errorKey !== "sso_failed" ? "i.singh" : ""} />
                      <Field id="password" name="password" label="Password"
                             type={showPwd ? "text" : "password"}
                             autoComplete="current-password" required placeholder="••••••••••••"
                             onKeyUp={onKeyUp} trailingPad={68}
                             trailing={<><CapsHint visible={caps} /><PasswordToggle shown={showPwd} onToggle={() => setShowPwd(v => !v)} /></>} />

                      {/* L-10 + L-11 — chevron removed from local submit; busy state added */}
                      <button type="submit" disabled={submitting !== null}
                              className="mt-2 inline-flex w-full items-center justify-center gap-x-2 rounded-md px-3.5 py-2.5 t-body-strong c-bg-accent-solid c-text-on-solid c-accent-ring dur-fast disabled:opacity-70 disabled:cursor-not-allowed"
                              style={{ boxShadow: "0 8px 24px oklch(72% 0.16 65 / 0.25), inset 0 1px 0 oklch(100% 0 0 / 0.18)" }}>
                        {submitting === "directory" ? <Spinner /> : null}
                        <span>{submitting === "directory" ? "Signing in…" : "Sign in"}</span>
                      </button>
                    </form>
                  </div>
              </div>
            </div>

            <footer className="flex items-center justify-between" style={{ paddingLeft: 48, paddingRight: 48, paddingTop: 20, paddingBottom: 24 }}>
              <a href="#" onClick={(e) => e.preventDefault()}
                 className="t-caption c-text-muted underline underline-offset-2 c-hover-text-primary dur-fast">Privacy &amp; data handling →</a>
              <span className="t-caption c-text-faint font-mono">v0.12.4</span>
            </footer>

          </div>
        </main>
      );
    }

    function App() {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        document.documentElement.classList.toggle("dark", tweaks.theme === "dark");
      }, [tweaks.theme]);

      return (
        <>
          <LoginPage tweaks={tweaks} />
          <window.TweaksPanel title="Tweaks">
            <window.TweakSection label="Theme">
              <window.TweakRadio
                label="Mode" value={tweaks.theme}
                options={[{ value: "light", label: "Light" }, { value: "dark", label: "Dark" }]}
                onChange={(v) => setTweak("theme", v)}
              />
            </window.TweakSection>
            <window.TweakSection label="State scenario">
              <window.TweakSelect
                label="Banner" value={tweaks.scenario}
                options={[
                  { value: "default", label: "Default — clean form" },
                  { value: "session-ended", label: "Session ended (info)" },
                  { value: "sso_failed", label: "SSO failed" },
                  { value: "bad_credentials", label: "Bad credentials" },
                  { value: "locked", label: "Account locked" },
                  { value: "no_role", label: "No codemaster role" },
                  { value: "ldap_unreachable", label: "LDAP unreachable" }
                ]}
                onChange={(v) => setTweak("scenario", v)}
              />
            </window.TweakSection>
          </window.TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
